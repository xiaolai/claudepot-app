services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: claudepot
      POSTGRES_USER: claudepot
      POSTGRES_PASSWORD: claudepot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claudepot"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
