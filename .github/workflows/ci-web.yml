name: CI / Web (Next.js)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/ci-web.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/ci-web.yml'
  workflow_dispatch:

env:
  # Opt every JavaScript-based action into Node 24 ahead of GitHub's
  # June 2026 forced switch. See ci.yml for the full rationale.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        env:
          NODE_ENV: test
        run: pnpm test

      # The DB client uses a non-connecting build-time stub when no
      # database secret is present, so this catches route/import,
      # MDX, asset, and standalone-tracing regressions before Vercel.
      - name: Production build
        run: pnpm build
