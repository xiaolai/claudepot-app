name: CI / Web (Next.js)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/ci-web.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/ci-web.yml'
  workflow_dispatch:

env:
  # Opt every JavaScript-based action into Node 24 ahead of GitHub's
  # June 2026 forced switch. See ci.yml for the full rationale.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        # `packageManager` in package.json pins the version; passing
        # `version:` too trips action-setup's "Multiple versions" error.
        uses: pnpm/action-setup@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        env:
          NODE_ENV: test
        run: pnpm test

      # `pnpm build` is intentionally NOT run here. The DB client's
      # build-time stub only lets Drizzle's brand check pass during
      # module introspection — it does NOT make build-time queries
      # succeed (Pool opens no connection until the first query). Several
      # routes DO query at build: `/c/[slug]`'s generateStaticParams and
      # `/sitemap.xml` both hit Neon, so a secret-free build fails on the
      # first prerendered query. Vercel already runs the full build per
      # push with the real database, which is the authoritative build
      # gate. CI's job here is typecheck + tests. To validate the build
      # in CI, wire a Neon preview-branch URL into the build step env via
      # `${{ secrets.NEON_DATABASE_URL_CI }}` and re-add it.
