name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------------
  # macOS — CLI (Developer-ID signed + notarized) + GUI (Tauri-managed signing + notarization)
  # ------------------------------------------------------------------
  build-macos:
    name: macOS ${{ matrix.arch }} (CLI + GUI)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # ----- CLI binary (Developer-ID signed + notarized via our script) -----

      - name: Build CLI release binary
        run: cargo build -p claudepot-cli --release --target ${{ matrix.target }}

      - name: Import signing certificate (CLI keychain)
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          set -eu
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode -o /tmp/cert.p12
          KC_PASS="ci-$(openssl rand -hex 16)"
          security create-keychain -p "$KC_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KC_PASS" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PASS" build.keychain
          curl -sSfL -o /tmp/DeveloperIDG2CA.cer \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates -k build.keychain /tmp/DeveloperIDG2CA.cer
          security find-identity -v -p codesigning build.keychain
          rm /tmp/cert.p12

      - name: Sign CLI binary
        run: .github/scripts/sign-macos.sh target/${{ matrix.target }}/release/claudepot

      - name: Zip CLI for notarization
        run: |
          cd target/${{ matrix.target }}/release
          zip -j claudepot-${{ matrix.arch }}.zip claudepot

      - name: Notarize CLI
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "target/${{ matrix.target }}/release/claudepot-${{ matrix.arch }}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      # ----- GUI bundle (.app + .dmg). Tauri auto-signs and notarizes via env vars. -----

      - name: Build GUI bundle (Tauri)
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: HANDO K.K. (Y53RSUA3SM)"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          pnpm tauri build --target ${{ matrix.target }} --bundles app,dmg

      - name: Stage GUI artifacts
        run: |
          set -eu
          mkdir -p release-staging
          # DMG
          DMG=$(ls target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          cp "$DMG" "release-staging/Claudepot-${{ matrix.arch }}.dmg"
          # App bundle (zip it for distribution)
          APP=$(ls -d target/${{ matrix.target }}/release/bundle/macos/*.app | head -1)
          (cd "$(dirname "$APP")" && zip -ry "$(pwd)/$(basename "$APP" .app)-${{ matrix.arch }}.app.zip" "$(basename "$APP")")
          mv "$(dirname "$APP")"/*-${{ matrix.arch }}.app.zip "release-staging/"
          ls -la release-staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claudepot-${{ matrix.arch }}-apple-darwin
          path: |
            target/${{ matrix.target }}/release/claudepot-${{ matrix.arch }}.zip
            release-staging/*
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

  # ------------------------------------------------------------------
  # Linux x86_64 — CLI (tarball) + GUI (.AppImage + .deb, unsigned)
  # ------------------------------------------------------------------
  build-linux-x86_64:
    name: Linux x86_64 (CLI + GUI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-cargo-release-gui-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI binary
        run: cargo build -p claudepot-cli --release

      - name: Package CLI
        run: |
          cd target/release
          tar czf claudepot-x86_64-linux.tar.gz claudepot

      - name: Build GUI bundle (Tauri)
        run: pnpm tauri build --bundles appimage,deb

      - name: Stage GUI artifacts
        run: |
          set -eu
          mkdir -p release-staging
          cp target/release/bundle/appimage/*.AppImage "release-staging/Claudepot-x86_64.AppImage" || true
          cp target/release/bundle/deb/*.deb "release-staging/Claudepot-x86_64.deb" || true
          ls -la release-staging/

      - uses: actions/upload-artifact@v4
        with:
          name: claudepot-x86_64-linux
          path: |
            target/release/claudepot-x86_64-linux.tar.gz
            release-staging/*
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Linux aarch64 — CLI only (cross-compiling Tauri's webkit deps in CI is painful;
  # GUI on Linux aarch64 is deferred until a native runner is available)
  # ------------------------------------------------------------------
  build-linux-aarch64:
    name: Linux aarch64 (CLI only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build -p claudepot-cli --release --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          cd target/aarch64-unknown-linux-gnu/release
          tar czf claudepot-aarch64-linux.tar.gz claudepot

      - uses: actions/upload-artifact@v4
        with:
          name: claudepot-aarch64-linux
          path: target/aarch64-unknown-linux-gnu/release/claudepot-aarch64-linux.tar.gz
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Windows x86_64 — CLI (zip) + GUI (.msi + .exe NSIS installer, unsigned)
  # ------------------------------------------------------------------
  build-windows:
    name: Windows x86_64 (CLI + GUI)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-cargo-release-gui-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build -p claudepot-cli --release

      - name: Package CLI
        run: |
          cd target/release
          Compress-Archive -Path claudepot.exe -DestinationPath claudepot-x86_64-windows.zip

      - name: Build GUI bundle (Tauri)
        run: pnpm tauri build --bundles msi,nsis

      - name: Stage GUI artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-staging | Out-Null
          Get-ChildItem -Path target/release/bundle/msi/*.msi | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64.msi"
          }
          Get-ChildItem -Path target/release/bundle/nsis/*.exe | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64-setup.exe"
          }
          Get-ChildItem release-staging

      - uses: actions/upload-artifact@v4
        with:
          name: claudepot-x86_64-windows
          path: |
            target/release/claudepot-x86_64-windows.zip
            release-staging/*
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Aggregate all artifacts into a draft GitHub release.
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs:
      - build-macos
      - build-linux-x86_64
      - build-linux-aarch64
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.zip' -o \
            -name '*.tar.gz' -o \
            -name '*.dmg' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.msi' -o \
            -name '*.exe' \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: true
          generate_release_notes: true
          body: |
            ## Downloads

            ### macOS
            - **GUI**: `Claudepot-aarch64.dmg` (Apple Silicon) or `Claudepot-x86_64.dmg` (Intel) — signed + notarized
            - **CLI**: `claudepot-aarch64.zip` or `claudepot-x86_64.zip` — signed + notarized

            ### Linux
            - **GUI** (x86_64): `Claudepot-x86_64.AppImage` (universal) or `Claudepot-x86_64.deb` (Debian/Ubuntu) — unsigned
            - **CLI**: `claudepot-x86_64-linux.tar.gz` or `claudepot-aarch64-linux.tar.gz`

            ### Windows
            - **GUI** (x86_64): `Claudepot-x86_64.msi` or `Claudepot-x86_64-setup.exe` — unsigned (Windows SmartScreen will warn)
            - **CLI**: `claudepot-x86_64-windows.zip`
