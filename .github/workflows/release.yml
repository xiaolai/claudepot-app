name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  # Opt every JavaScript-based action into Node 24 ahead of GitHub's
  # June 2026 forced switch. See ci.yml for the full rationale.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ------------------------------------------------------------------
  # Pre-flight: refuse to ship if the updater pubkey is empty. With
  # an empty pubkey the runtime falls back to the in-Rust gate
  # (`updater_supported()` returns false), so the build wouldn't be
  # *unsafe* — but it would ship a production binary whose in-app
  # updater is silently disabled, which is worse than no release at
  # all. Failing the workflow at the start surfaces the missing
  # config before the matrix burns 10+ runner-minutes. Local dev and
  # feature branches don't run release.yml so this gate doesn't slow
  # them down.
  # ------------------------------------------------------------------
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify updater pubkey is set
        run: |
          set -eu
          PUBKEY=$(jq -r '.plugins.updater.pubkey // ""' src-tauri/tauri.conf.json)
          if [ -z "$PUBKEY" ]; then
            echo "::error::src-tauri/tauri.conf.json plugins.updater.pubkey is empty."
            echo "::error::Generate a keypair with 'pnpm tauri signer generate' and embed the public key before tagging a release. See dev-docs/auto-update.md."
            exit 1
          fi
          echo "OK: updater pubkey present (${#PUBKEY} chars)"

  # ------------------------------------------------------------------
  # macOS — CLI (Developer-ID signed + notarized) + GUI (Tauri-managed signing + notarization)
  # ------------------------------------------------------------------
  build-macos:
    needs: preflight
    name: macOS ${{ matrix.arch }} (CLI + GUI)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # ----- CLI binary (Developer-ID signed + notarized via our script) -----

      - name: Build CLI release binary
        run: cargo build -p claudepot-cli --release --target ${{ matrix.target }}

      - name: Import signing certificate (CLI keychain)
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          set -eu
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode -o /tmp/cert.p12
          KC_PASS="ci-$(openssl rand -hex 16)"
          security create-keychain -p "$KC_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KC_PASS" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PASS" build.keychain
          curl -sSfL -o /tmp/DeveloperIDG2CA.cer \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates -k build.keychain /tmp/DeveloperIDG2CA.cer
          security find-identity -v -p codesigning build.keychain
          rm /tmp/cert.p12

      - name: Sign CLI binary
        run: .github/scripts/sign-macos.sh target/${{ matrix.target }}/release/claudepot

      - name: Zip CLI for notarization
        run: |
          cd target/${{ matrix.target }}/release
          zip -j claudepot-${{ matrix.arch }}.zip claudepot

      - name: Notarize CLI
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "target/${{ matrix.target }}/release/claudepot-${{ matrix.arch }}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      # Stage the freshly-built CLI as a Tauri externalBin so the GUI
      # bundle below includes it at Contents/MacOS/claudepot-cli-<triple>.
      # The Homebrew cask references this path and symlinks it as
      # /opt/homebrew/bin/claudepot, so `brew install --cask claudepot`
      # gives users both the GUI and the CLI in one step.
      - name: Stage CLI into Tauri externalBin slot
        run: |
          set -eu
          mkdir -p src-tauri/binaries
          cp "target/${{ matrix.target }}/release/claudepot" \
             "src-tauri/binaries/claudepot-cli-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/claudepot-cli-${{ matrix.target }}"

      # ----- GUI bundle (.app + .dmg). Tauri auto-signs and notarizes via env vars. -----

      - name: Build GUI bundle (Tauri)
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: HANDO K.K. (Y53RSUA3SM)"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri-2 updater minisign signing — the env vars are read by
          # `tauri build` when `bundle.createUpdaterArtifacts: true` is
          # set, producing `.app.tar.gz` + `.app.tar.gz.sig` alongside
          # the .app/.dmg. Empty on PRs (secret missing) → updater
          # artifacts are skipped, regular bundles still build.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm tauri build --target ${{ matrix.target }} --bundles app,dmg,updater

      - name: Stage GUI artifacts
        run: |
          set -eu
          mkdir -p release-staging
          # DMG
          DMG=$(ls target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          cp "$DMG" "release-staging/Claudepot-${{ matrix.arch }}.dmg"
          # App bundle (zip it for distribution)
          APP=$(ls -d target/${{ matrix.target }}/release/bundle/macos/*.app | head -1)
          (cd "$(dirname "$APP")" && zip -ry "$(pwd)/$(basename "$APP" .app)-${{ matrix.arch }}.app.zip" "$(basename "$APP")")
          mv "$(dirname "$APP")"/*-${{ matrix.arch }}.app.zip "release-staging/"
          # Updater bundle: `.app.tar.gz` + `.sig`. Tauri's macOS bundler
          # uses the .app's basename, so we rename to a stable filename
          # (`Claudepot-<arch>.app.tar.gz`) the latest.json job can
          # reference without scraping per-version paths.
          UPDATER=$(ls target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz 2>/dev/null | head -1 || true)
          if [ -n "$UPDATER" ]; then
            cp "$UPDATER"      "release-staging/Claudepot-${{ matrix.arch }}.app.tar.gz"
            cp "$UPDATER.sig"  "release-staging/Claudepot-${{ matrix.arch }}.app.tar.gz.sig"
          fi
          ls -la release-staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claudepot-${{ matrix.arch }}-apple-darwin
          path: |
            target/${{ matrix.target }}/release/claudepot-${{ matrix.arch }}.zip
            release-staging/*
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

  # ------------------------------------------------------------------
  # Linux x86_64 — CLI (tarball) + GUI (.AppImage + .deb, unsigned)
  # ------------------------------------------------------------------
  build-linux-x86_64:
    name: Linux x86_64 (CLI + GUI)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-cargo-release-gui-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI binary
        run: cargo build -p claudepot-cli --release

      - name: Package CLI
        run: |
          cd target/release
          tar czf claudepot-x86_64-linux.tar.gz claudepot

      - name: Build GUI bundle (Tauri)
        env:
          # Updater bundles for Linux: `.AppImage.tar.gz` + `.sig`. `.deb`
          # users are expected to upgrade via apt, so the in-app updater
          # only surfaces an "Open Releases" link for them; only the
          # AppImage is signed here.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles appimage,deb,updater

      - name: Stage GUI artifacts
        run: |
          set -eu
          mkdir -p release-staging
          cp target/release/bundle/appimage/*.AppImage "release-staging/Claudepot-x86_64.AppImage" || true
          cp target/release/bundle/deb/*.deb "release-staging/Claudepot-x86_64.deb" || true
          # Updater bundle for Linux is `.AppImage.tar.gz` (the AppImage
          # repackaged as a signed tarball).
          UPDATER=$(ls target/release/bundle/appimage/*.AppImage.tar.gz 2>/dev/null | head -1 || true)
          if [ -n "$UPDATER" ]; then
            cp "$UPDATER"      "release-staging/Claudepot-x86_64.AppImage.tar.gz"
            cp "$UPDATER.sig"  "release-staging/Claudepot-x86_64.AppImage.tar.gz.sig"
          fi
          ls -la release-staging/

      - uses: actions/upload-artifact@v4
        with:
          name: claudepot-x86_64-linux
          path: |
            target/release/claudepot-x86_64-linux.tar.gz
            release-staging/*
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Linux aarch64 — CLI only (cross-compiling Tauri's webkit deps in CI is painful;
  # GUI on Linux aarch64 is deferred until a native runner is available)
  # ------------------------------------------------------------------
  build-linux-aarch64:
    name: Linux aarch64 (CLI only)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build -p claudepot-cli --release --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          cd target/aarch64-unknown-linux-gnu/release
          tar czf claudepot-aarch64-linux.tar.gz claudepot

      - uses: actions/upload-artifact@v4
        with:
          name: claudepot-aarch64-linux
          path: target/aarch64-unknown-linux-gnu/release/claudepot-aarch64-linux.tar.gz
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Windows x86_64 — CLI (zip) + GUI (.msi + .exe NSIS installer, unsigned)
  # ------------------------------------------------------------------
  build-windows:
    name: Windows x86_64 (CLI + GUI)
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-cargo-release-gui-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build -p claudepot-cli --release

      - name: Package CLI
        run: |
          cd target/release
          Compress-Archive -Path claudepot.exe -DestinationPath claudepot-x86_64-windows.zip

      - name: Build GUI bundle (Tauri)
        env:
          # Updater bundles for Windows: `.nsis.zip` + `.sig` (the NSIS
          # installer repackaged as a signed zip). MSI updater bundles
          # are also produced (`.msi.zip` + `.sig`) so MSI installs can
          # update too.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles msi,nsis,updater

      - name: Stage GUI artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-staging | Out-Null
          Get-ChildItem -Path target/release/bundle/msi/*.msi | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64.msi"
          }
          Get-ChildItem -Path target/release/bundle/nsis/*.exe | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64-setup.exe"
          }
          # Updater bundles + sigs (NSIS preferred; MSI also signed for
          # users who installed via msiexec).
          Get-ChildItem -Path target/release/bundle/nsis/*.nsis.zip -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64-setup.nsis.zip"
          }
          Get-ChildItem -Path target/release/bundle/nsis/*.nsis.zip.sig -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64-setup.nsis.zip.sig"
          }
          Get-ChildItem -Path target/release/bundle/msi/*.msi.zip -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64.msi.zip"
          }
          Get-ChildItem -Path target/release/bundle/msi/*.msi.zip.sig -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64.msi.zip.sig"
          }
          Get-ChildItem release-staging

      - uses: actions/upload-artifact@v4
        with:
          name: claudepot-x86_64-windows
          path: |
            target/release/claudepot-x86_64-windows.zip
            release-staging/*
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Aggregate all artifacts into a draft GitHub release.
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs:
      - build-macos
      - build-linux-x86_64
      - build-linux-aarch64
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          # Include updater `.sig` files alongside everything else.
          # `.AppImage.tar.gz` matches via `.tar.gz`; `.app.tar.gz`
          # matches via `.tar.gz`; `.nsis.zip` / `.msi.zip` match via
          # `.zip`; `.sig` is its own pattern.
          find artifacts -type f \( \
            -name '*.zip' -o \
            -name '*.tar.gz' -o \
            -name '*.dmg' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.sig' \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Create release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: true
          generate_release_notes: true
          body: |
            ## Downloads

            ### macOS
            - **GUI**: `Claudepot-aarch64.dmg` (Apple Silicon) or `Claudepot-x86_64.dmg` (Intel) — signed + notarized
            - **CLI**: `claudepot-aarch64.zip` or `claudepot-x86_64.zip` — signed + notarized

            ### Linux
            - **GUI** (x86_64): `Claudepot-x86_64.AppImage` (universal) or `Claudepot-x86_64.deb` (Debian/Ubuntu) — unsigned
            - **CLI**: `claudepot-x86_64-linux.tar.gz` or `claudepot-aarch64-linux.tar.gz`

            ### Windows
            - **GUI** (x86_64): `Claudepot-x86_64.msi` or `Claudepot-x86_64-setup.exe` — unsigned (Windows SmartScreen will warn)
            - **CLI**: `claudepot-x86_64-windows.zip`

            ### In-app auto-update
            Versions ≥0.0.7 carry a minisign-signed updater bundle.
            macOS, Linux AppImage, and Windows NSIS / MSI installs check
            for new versions in Settings → About; `.deb` users update
            via apt as before.

      # Generate Tauri-2 latest.json from the four signature files so
      # the in-app updater can verify and install the new bundles.
      # Tauri's updater plugin parses the `version` field with `semver`
      # — a leading 'v' breaks parsing silently — so we strip it. Each
      # platform entry is gated on the existence of its `.sig`, so a
      # missing signing secret on one platform doesn't break the others
      # (the latest.json simply omits that platform; the updater
      # reports "no update available" for users on that OS).
      - name: Generate latest.json
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -eu
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          read_sig() {
            local f="release/$1"
            [ -f "$f" ] || return 1
            cat "$f"
          }

          {
            echo "{"
            echo "  \"version\": \"$VERSION\","
            echo "  \"notes\": \"See release notes at https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG\","
            echo "  \"pub_date\": \"$PUB_DATE\","
            echo "  \"platforms\": {"

            sep=""
            if SIG=$(read_sig "Claudepot-aarch64.app.tar.gz.sig"); then
              echo "$sep    \"darwin-aarch64\": {"
              echo "      \"signature\": \"$SIG\","
              echo "      \"url\": \"$BASE_URL/Claudepot-aarch64.app.tar.gz\""
              echo "    }"
              sep=","
            fi
            if SIG=$(read_sig "Claudepot-x86_64.app.tar.gz.sig"); then
              echo "$sep    \"darwin-x86_64\": {"
              echo "      \"signature\": \"$SIG\","
              echo "      \"url\": \"$BASE_URL/Claudepot-x86_64.app.tar.gz\""
              echo "    }"
              sep=","
            fi
            if SIG=$(read_sig "Claudepot-x86_64.AppImage.tar.gz.sig"); then
              echo "$sep    \"linux-x86_64\": {"
              echo "      \"signature\": \"$SIG\","
              echo "      \"url\": \"$BASE_URL/Claudepot-x86_64.AppImage.tar.gz\""
              echo "    }"
              sep=","
            fi
            if SIG=$(read_sig "Claudepot-x86_64-setup.nsis.zip.sig"); then
              echo "$sep    \"windows-x86_64\": {"
              echo "      \"signature\": \"$SIG\","
              echo "      \"url\": \"$BASE_URL/Claudepot-x86_64-setup.nsis.zip\""
              echo "    }"
              sep=","
            fi

            echo "  }"
            echo "}"
          } > latest.json

          echo "Generated latest.json:"
          cat latest.json

          # Validate. Tauri's updater rejects a leading 'v' or non-SemVer
          # version. An unsubstituted shell variable in a URL means the
          # heredoc lost a value and would silently fail at runtime.
          MV=$(jq -er '.version' latest.json)
          if [[ "$MV" =~ ^v ]] || ! [[ "$MV" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]]; then
            echo "::error::latest.json version field invalid: '$MV'"
            exit 1
          fi
          if jq -er '.platforms[] | select(.url | test("\\$|\\{|VERSION|GITHUB_"))' latest.json > /dev/null 2>&1; then
            echo "::error::latest.json contains an unexpanded shell variable in a platform URL"
            exit 1
          fi
          # Every supported platform MUST be present. If the Linux
          # AppImage signer fails on one release, Linux clients on the
          # *next* release would otherwise see "no update available"
          # silently because Tauri's plugin returns "no update" when
          # the platform key is missing — they'd be stuck on whichever
          # version they ran when the signer last worked. Failing the
          # release loudly forces the operator to fix the signing
          # secret before any client gets stuck.
          REQUIRED=("darwin-aarch64" "darwin-x86_64" "linux-x86_64" "windows-x86_64")
          MISSING=()
          for p in "${REQUIRED[@]}"; do
            if ! jq -er ".platforms.\"$p\"" latest.json > /dev/null 2>&1; then
              MISSING+=("$p")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::latest.json is missing required platforms: ${MISSING[*]}"
            echo "::error::Cause: a build failed to produce a .sig (likely TAURI_SIGNING_PRIVATE_KEY missing on that runner)."
            exit 1
          fi
          PLATFORMS=$(jq -er '.platforms | length' latest.json)
          echo "OK: latest.json validates with $PLATFORMS platform(s) — all required targets present"

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release upload "$TAG" latest.json --repo "$GITHUB_REPOSITORY" --clobber

      # Homebrew can't fetch draft release assets (they require auth),
      # so the tap-update workflow needs a published release. Comment
      # the next two steps out if you want a manual review gate instead.
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"

      - name: Trigger Homebrew tap update
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION_NUM="${TAG#v}"
          gh workflow run update-homebrew.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f version="$VERSION_NUM"
          echo "Triggered Homebrew tap update for $VERSION_NUM"
