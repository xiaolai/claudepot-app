name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  # Opt every JavaScript-based action into Node 24 ahead of GitHub's
  # June 2026 forced switch. See ci.yml for the full rationale.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ------------------------------------------------------------------
  # Pre-flight: refuse to ship if the updater pubkey is empty. With
  # an empty pubkey the runtime falls back to the in-Rust gate
  # (`updater_supported()` returns false), so the build wouldn't be
  # *unsafe* — but it would ship a production binary whose in-app
  # updater is silently disabled, which is worse than no release at
  # all. Failing the workflow at the start surfaces the missing
  # config before the matrix burns 10+ runner-minutes. Local dev and
  # feature branches don't run release.yml so this gate doesn't slow
  # them down.
  # ------------------------------------------------------------------
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify updater pubkey is set
        run: |
          set -eu
          PUBKEY=$(jq -r '.plugins.updater.pubkey // ""' src-tauri/tauri.conf.json)
          if [ -z "$PUBKEY" ]; then
            echo "::error::src-tauri/tauri.conf.json plugins.updater.pubkey is empty."
            echo "::error::Generate a keypair with 'pnpm tauri signer generate' and embed the public key before tagging a release. See dev-docs/auto-update.md."
            exit 1
          fi
          echo "OK: updater pubkey present (${#PUBKEY} chars)"

      # Fail malformed tags here, before the build matrix burns 30+
      # runner-minutes. The release job's channel classifier repeats
      # this check (it also derives the channel outputs the upload
      # steps consume) — this is the early gate, that's the backstop.
      - name: Validate tag shape
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -eu
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]]; then
            echo "OK: tag '$TAG' is a supported release shape"
          else
            echo "::error::Tag '$TAG' is not a supported release tag shape."
            echo "::error::Only bare 'vX.Y.Z' stable tags and 'vX.Y.Z-beta.N' prereleases are supported."
            exit 1
          fi

      # The updater manifest version is derived from the git tag
      # (VERSION="${TAG#v}" in the release job) while the built
      # bundles carry the version baked into tauri.conf.json. If the
      # two disagree, latest.json advertises a version the installed
      # bundle doesn't report and every client enters a permanent
      # download-install-still-outdated loop. /bump keeps the five
      # version sites in lock-step, but nothing else enforces it —
      # this step does, mechanically, before any build starts.
      - name: Verify version lock-step (tag vs manifests vs banners)
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -eu
          VERSION="${TAG#v}"
          FAIL=0
          check() {
            local name="$1" actual="$2"
            if [ "$actual" = "$VERSION" ]; then
              echo "OK: $name = $actual"
            else
              echo "::error::$name is '$actual' but the tag says '$VERSION'. Run /bump, commit, and re-tag."
              FAIL=1
            fi
          }
          check "Cargo.toml [workspace.package] version" \
            "$(awk -F'"' '/^\[workspace\.package\]/{f=1} f && /^version[[:space:]]*=/{print $2; exit}' Cargo.toml)"
          check "package.json version" \
            "$(jq -r .version package.json)"
          check "src-tauri/tauri.conf.json version" \
            "$(jq -r .version src-tauri/tauri.conf.json)"
          check "README.md status banner" \
            "$(sed -n 's/^> \*\*Status: [a-z]*\*\* (`\([^`]*\)`).*/\1/p' README.md | head -1)"
          check "web install page status banner" \
            "$(sed -n 's/^> \*\*Status: [a-z]* (`\([^`]*\)`).*/\1/p' 'web/src/app/(reader)/app/install/page.mdx' | head -1)"
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "OK: all five version sites agree with the tag ($VERSION)"

  # ------------------------------------------------------------------
  # macOS — CLI (Developer-ID signed + notarized) + GUI (Tauri-managed signing + notarization)
  # ------------------------------------------------------------------
  build-macos:
    needs: preflight
    name: macOS ${{ matrix.arch }} (CLI + GUI)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup pnpm
        # `packageManager` in package.json pins the version (now pnpm 10,
        # matching the pnpm-10 lockfile). Passing `version:` too trips
        # action-setup's "Multiple versions of pnpm specified" error.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      # Swatinem/rust-cache keys on job id + toolchain + lockfile and
      # prunes stale artifacts, unlike a raw actions/cache of target/
      # keyed only on Cargo.lock (which froze at the first
      # post-lockfile-change run and re-uploaded multi-GB archives).
      # `key` disambiguates the two arch legs of this matrix job.
      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # ----- CLI binary (Developer-ID signed + notarized via our script) -----

      - name: Build CLI release binary
        run: cargo build -p claudepot-cli --release --target ${{ matrix.target }}

      - name: Import signing certificate (CLI keychain)
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          set -eu
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode -o /tmp/cert.p12
          KC_PASS="ci-$(openssl rand -hex 16)"
          security create-keychain -p "$KC_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KC_PASS" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PASS" build.keychain
          curl -sSfL -o /tmp/DeveloperIDG2CA.cer \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates -k build.keychain /tmp/DeveloperIDG2CA.cer
          security find-identity -v -p codesigning build.keychain
          rm /tmp/cert.p12

      - name: Sign CLI binary
        run: .github/scripts/sign-macos.sh target/${{ matrix.target }}/release/claudepot

      - name: Zip CLI for notarization
        run: |
          cd target/${{ matrix.target }}/release
          zip -j claudepot-${{ matrix.arch }}.zip claudepot

      - name: Notarize CLI
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "target/${{ matrix.target }}/release/claudepot-${{ matrix.arch }}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      # Stage the freshly-built CLI as a Tauri externalBin so the GUI
      # bundle below includes it at Contents/MacOS/claudepot-cli-<triple>.
      # The Homebrew cask references this path and symlinks it as
      # /opt/homebrew/bin/claudepot, so `brew install --cask claudepot`
      # gives users both the GUI and the CLI in one step.
      - name: Stage CLI into Tauri externalBin slot
        run: |
          set -eu
          mkdir -p src-tauri/binaries
          cp "target/${{ matrix.target }}/release/claudepot" \
             "src-tauri/binaries/claudepot-cli-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/claudepot-cli-${{ matrix.target }}"

      # ----- GUI bundle (.app + .dmg). Tauri auto-signs and notarizes via env vars. -----

      - name: Build GUI bundle (Tauri)
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: HANDO K.K. (Y53RSUA3SM)"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri-2 updater minisign signing — the env vars are read by
          # `tauri build` when `bundle.createUpdaterArtifacts: true` is
          # set, producing `.app.tar.gz` + `.app.tar.gz.sig` alongside
          # the .app/.dmg. Empty on PRs (secret missing) → updater
          # artifacts are skipped, regular bundles still build.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm tauri build --target ${{ matrix.target }} --bundles app,dmg,updater

      - name: Stage GUI artifacts
        run: |
          set -eu
          mkdir -p release-staging
          # DMG
          DMG=$(ls target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          cp "$DMG" "release-staging/Claudepot-${{ matrix.arch }}.dmg"
          # App bundle (zip it for distribution)
          APP=$(ls -d target/${{ matrix.target }}/release/bundle/macos/*.app | head -1)
          (cd "$(dirname "$APP")" && zip -ry "$(pwd)/$(basename "$APP" .app)-${{ matrix.arch }}.app.zip" "$(basename "$APP")")
          mv "$(dirname "$APP")"/*-${{ matrix.arch }}.app.zip "release-staging/"
          # Updater bundle: `.app.tar.gz` + `.sig`. Tauri's macOS bundler
          # uses the .app's basename, so we rename to a stable filename
          # (`Claudepot-<arch>.app.tar.gz`) the latest.json job can
          # reference without scraping per-version paths.
          UPDATER=$(ls target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz 2>/dev/null | head -1 || true)
          if [ -n "$UPDATER" ]; then
            cp "$UPDATER"      "release-staging/Claudepot-${{ matrix.arch }}.app.tar.gz"
            cp "$UPDATER.sig"  "release-staging/Claudepot-${{ matrix.arch }}.app.tar.gz.sig"
          fi
          ls -la release-staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: claudepot-${{ matrix.arch }}-apple-darwin
          path: |
            target/${{ matrix.target }}/release/claudepot-${{ matrix.arch }}.zip
            release-staging/*
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

  # ------------------------------------------------------------------
  # Linux x86_64 — CLI (tarball) + GUI (.AppImage + .deb, unsigned)
  # ------------------------------------------------------------------
  build-linux-x86_64:
    name: Linux x86_64 (CLI + GUI)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Setup pnpm
        # `packageManager` in package.json pins the version (now pnpm 10,
        # matching the pnpm-10 lockfile). Passing `version:` too trips
        # action-setup's "Multiple versions of pnpm specified" error.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # See build-macos for why rust-cache replaces actions/cache.
      - name: Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Build CLI binary
        run: cargo build -p claudepot-cli --release

      - name: Package CLI
        run: |
          cd target/release
          tar czf claudepot-x86_64-linux.tar.gz claudepot

      # Stage CLI for tauri.conf.json `bundle.externalBin`. Without
      # this, the GUI bundle ships without `claudepot-cli-<triple>` in
      # Contents/MacOS/ (or its Linux/Windows equivalents) and the
      # macOS cask's `binary` symlink fails at install time. Linux
      # users mostly install the standalone CLI tarball, but bundling
      # it inside the .AppImage / .deb is harmless and matches the
      # macOS / Windows patterns.
      - name: Stage CLI into Tauri externalBin slot
        run: |
          set -eu
          mkdir -p src-tauri/binaries
          cp target/release/claudepot \
             src-tauri/binaries/claudepot-cli-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/claudepot-cli-x86_64-unknown-linux-gnu

      - name: Build GUI bundle (Tauri)
        env:
          # Updater signature for Linux: Tauri 2 signs the `.AppImage`
          # directly (a self-contained AppImage file) and writes
          # `.AppImage.sig` next to it. `.deb` users are expected to
          # upgrade via apt, so the in-app updater only surfaces an
          # "Open Releases" link for them; only the AppImage is wired
          # into latest.json below.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles appimage,deb,updater

      - name: Stage GUI artifacts
        run: |
          set -eu
          mkdir -p release-staging
          cp target/release/bundle/appimage/*.AppImage "release-staging/Claudepot-x86_64.AppImage" || true
          cp target/release/bundle/deb/*.deb "release-staging/Claudepot-x86_64.deb" || true
          # Updater signature: in Tauri 2 the AppImage IS the updater
          # artifact, so the .sig sits next to the .AppImage. Stage it
          # under a stable name the latest.json job can reference.
          SIG=$(ls target/release/bundle/appimage/*.AppImage.sig 2>/dev/null | head -1 || true)
          if [ -n "$SIG" ]; then
            cp "$SIG" "release-staging/Claudepot-x86_64.AppImage.sig"
          fi
          ls -la release-staging/

      - uses: actions/upload-artifact@v6
        with:
          name: claudepot-x86_64-linux
          path: |
            target/release/claudepot-x86_64-linux.tar.gz
            release-staging/*
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Linux aarch64 — CLI only (cross-compiling Tauri's webkit deps in CI is painful;
  # GUI on Linux aarch64 is deferred until a native runner is available)
  # ------------------------------------------------------------------
  build-linux-aarch64:
    name: Linux aarch64 (CLI only)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      # See build-macos for why rust-cache replaces actions/cache.
      - name: Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build -p claudepot-cli --release --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          cd target/aarch64-unknown-linux-gnu/release
          tar czf claudepot-aarch64-linux.tar.gz claudepot

      - uses: actions/upload-artifact@v6
        with:
          name: claudepot-aarch64-linux
          path: target/aarch64-unknown-linux-gnu/release/claudepot-aarch64-linux.tar.gz
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Windows x86_64 — CLI (zip) + GUI (.msi + .exe NSIS installer, unsigned)
  # ------------------------------------------------------------------
  build-windows:
    name: Windows x86_64 (CLI + GUI)
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        # `packageManager` in package.json pins the version (now pnpm 10,
        # matching the pnpm-10 lockfile). Passing `version:` too trips
        # action-setup's "Multiple versions of pnpm specified" error.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # See build-macos for why rust-cache replaces actions/cache.
      - name: Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build -p claudepot-cli --release

      - name: Package CLI
        run: |
          cd target/release
          # `-Force` so a re-dispatch picks up a cached `target/release`
          # without tripping over a stale zip from the previous run.
          Compress-Archive -Path claudepot.exe -DestinationPath claudepot-x86_64-windows.zip -Force

      # Stage CLI for tauri.conf.json `bundle.externalBin`. Tauri's
      # Windows convention requires the `.exe` extension on the
      # staged file; macOS / Linux don't.
      - name: Stage CLI into Tauri externalBin slot
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          Copy-Item target/release/claudepot.exe `
                    src-tauri/binaries/claudepot-cli-x86_64-pc-windows-msvc.exe

      - name: Build GUI bundle (Tauri)
        env:
          # Updater signatures for Windows: Tauri 2 signs the NSIS and
          # MSI installers directly, writing `<installer>.sig` next to
          # each. The in-app updater downloads the installer the user
          # originally got — NSIS for `-setup.exe`, MSI for the .msi —
          # so we stage both .sig files under stable names.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles msi,nsis,updater

      - name: Stage GUI artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-staging | Out-Null
          Get-ChildItem -Path target/release/bundle/msi/*.msi | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64.msi"
          }
          Get-ChildItem -Path target/release/bundle/nsis/*.exe | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64-setup.exe"
          }
          # Updater signatures (NSIS is what latest.json points at; MSI
          # signature is shipped alongside for users who installed via
          # msiexec and want to verify offline).
          Get-ChildItem -Path target/release/bundle/nsis/*-setup.exe.sig -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64-setup.exe.sig"
          }
          Get-ChildItem -Path target/release/bundle/msi/*.msi.sig -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "release-staging/Claudepot-x86_64.msi.sig"
          }
          Get-ChildItem release-staging

      - uses: actions/upload-artifact@v6
        with:
          name: claudepot-x86_64-windows
          path: |
            target/release/claudepot-x86_64-windows.zip
            release-staging/*
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Aggregate all artifacts into a draft GitHub release.
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs:
      - build-macos
      - build-linux-x86_64
      - build-linux-aarch64
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` for `softprops/action-gh-release` and `gh release upload`.
      # `actions: write` for the `gh workflow run update-homebrew.yml` dispatch
      # at the end of the job — without it, that call hits HTTP 403
      # "Resource not accessible by integration" and the Homebrew tap
      # silently never updates (the step has continue-on-error so the
      # release ships green either way).
      contents: write
      actions: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      # Classify the release channel from the tag shape. A tag with a
      # `-beta.N` suffix (e.g. `v0.2.0-beta.1`) is a prerelease and
      # routes through the beta channel; everything else is stable.
      # The two `GITHUB_OUTPUT` values drive the prerelease flag, the
      # manifest filename, and the manifest upload target below.
      - name: Classify release channel
        id: channel
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -eu
          if [[ "$TAG" =~ -beta\.[0-9]+$ ]]; then
            echo "is_beta=true"     >> "$GITHUB_OUTPUT"
            echo "manifest=latest-beta.json" >> "$GITHUB_OUTPUT"
            echo "Channel: beta (prerelease) — tag $TAG"
          elif [[ "$TAG" =~ -[A-Za-z] ]]; then
            # Any other pre-release suffix (-alpha, -rc, …) is not a
            # shape this pipeline supports. Fail loudly rather than
            # silently treating it as stable and clobbering latest.json.
            echo "::error::Tag '$TAG' has an unrecognized pre-release suffix."
            echo "::error::Only '-beta.N' prereleases and bare 'vX.Y.Z' stable tags are supported."
            exit 1
          else
            echo "is_beta=false"    >> "$GITHUB_OUTPUT"
            echo "manifest=latest.json" >> "$GITHUB_OUTPUT"
            echo "Channel: stable — tag $TAG"
          fi

      - name: Flatten artifacts
        run: |
          mkdir -p release
          # Include updater `.sig` files alongside everything else.
          # macOS's updater target is `.app.tar.gz` (matches `.tar.gz`);
          # Linux signs the `.AppImage` directly; Windows signs the
          # `.msi` and `-setup.exe` directly. The `.sig` pattern catches
          # all three signature flavors.
          find artifacts -type f \( \
            -name '*.zip' -o \
            -name '*.tar.gz' -o \
            -name '*.dmg' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.sig' \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Create release (draft)
        uses: softprops/action-gh-release@v3
        with:
          # softprops/action-gh-release defaults `tag_name` to
          # `github.ref`, which is `refs/heads/main` (a branch, not a
          # tag) when the workflow is invoked via `workflow_dispatch`.
          # The action then tries to create a release at that branch
          # ref and the GH API rejects it with HTTP 400. The rest of
          # this job already resolves the tag via
          # `${{ github.event.inputs.tag || github.ref_name }}`; mirror
          # that here so `workflow_dispatch` runs land at the right
          # tag. Tag-triggered runs see `github.ref_name = v0.1.X`,
          # which is what we want.
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release/*
          draft: true
          # `-beta.N` tags publish as a GitHub prerelease so the
          # stable `/releases/latest/` URL keeps skipping them — only
          # the fixed-tag beta manifest serves beta update traffic.
          prerelease: ${{ steps.channel.outputs.is_beta == 'true' }}
          generate_release_notes: true
          body: |
            ## Downloads

            ### macOS
            - **GUI**: `Claudepot-aarch64.dmg` (Apple Silicon) or `Claudepot-x86_64.dmg` (Intel) — signed + notarized
            - **CLI**: `claudepot-aarch64.zip` or `claudepot-x86_64.zip` — signed + notarized

            ### Linux
            - **GUI** (x86_64): `Claudepot-x86_64.AppImage` (universal) or `Claudepot-x86_64.deb` (Debian/Ubuntu) — unsigned
            - **CLI**: `claudepot-x86_64-linux.tar.gz` or `claudepot-aarch64-linux.tar.gz`

            ### Windows
            - **GUI** (x86_64): `Claudepot-x86_64.msi` or `Claudepot-x86_64-setup.exe` — unsigned (Windows SmartScreen will warn)
            - **CLI**: `claudepot-x86_64-windows.zip`

            ### In-app auto-update
            Versions ≥0.0.7 carry a minisign-signed updater bundle.
            macOS, Linux AppImage, and Windows NSIS installs check for
            new versions in Settings → About; `.msi` and `.deb` users
            update via their installer / package manager.

      # Generate the Tauri-2 updater manifest from the four signature
      # files so the in-app updater can verify and install the new
      # bundles. Tauri's updater plugin parses the `version` field with
      # `semver` — a leading 'v' breaks parsing silently — so we strip
      # it. Each platform entry is gated on the existence of its
      # `.sig`, so a missing signing secret on one platform doesn't
      # break the others.
      #
      # Channel-aware filename: a stable release writes `latest.json`
      # (served via `/releases/latest/download/latest.json`); a beta
      # release writes `latest-beta.json` (served via the fixed-tag
      # `updater-manifest` release — see the upload step below). The
      # asset URLs point at the per-tag release in BOTH cases, so a
      # beta manifest hosted on `updater-manifest` still resolves its
      # `.app.tar.gz` / `.AppImage` / `-setup.exe` correctly.
      - name: Generate updater manifest
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          MANIFEST: ${{ steps.channel.outputs.manifest }}
        run: |
          set -eu
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          read_sig() {
            local f="release/$1"
            [ -f "$f" ] || return 1
            cat "$f"
          }

          {
            echo "{"
            echo "  \"version\": \"$VERSION\","
            echo "  \"notes\": \"See release notes at https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG\","
            echo "  \"pub_date\": \"$PUB_DATE\","
            echo "  \"platforms\": {"

            sep=""
            if SIG=$(read_sig "Claudepot-aarch64.app.tar.gz.sig"); then
              echo "$sep    \"darwin-aarch64\": {"
              echo "      \"signature\": \"$SIG\","
              echo "      \"url\": \"$BASE_URL/Claudepot-aarch64.app.tar.gz\""
              echo "    }"
              sep=","
            fi
            if SIG=$(read_sig "Claudepot-x86_64.app.tar.gz.sig"); then
              echo "$sep    \"darwin-x86_64\": {"
              echo "      \"signature\": \"$SIG\","
              echo "      \"url\": \"$BASE_URL/Claudepot-x86_64.app.tar.gz\""
              echo "    }"
              sep=","
            fi
            if SIG=$(read_sig "Claudepot-x86_64.AppImage.sig"); then
              echo "$sep    \"linux-x86_64\": {"
              echo "      \"signature\": \"$SIG\","
              echo "      \"url\": \"$BASE_URL/Claudepot-x86_64.AppImage\""
              echo "    }"
              sep=","
            fi
            if SIG=$(read_sig "Claudepot-x86_64-setup.exe.sig"); then
              echo "$sep    \"windows-x86_64\": {"
              echo "      \"signature\": \"$SIG\","
              echo "      \"url\": \"$BASE_URL/Claudepot-x86_64-setup.exe\""
              echo "    }"
              sep=","
            fi

            echo "  }"
            echo "}"
          } > "$MANIFEST"

          echo "Generated $MANIFEST:"
          cat "$MANIFEST"

          # Validate. Tauri's updater rejects a leading 'v' or non-SemVer
          # version. A `-beta.N` suffix is valid SemVer pre-release, so
          # the regex below permits it. An unsubstituted shell variable
          # in a URL means the heredoc lost a value.
          MV=$(jq -er '.version' "$MANIFEST")
          if [[ "$MV" =~ ^v ]] || ! [[ "$MV" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]]; then
            echo "::error::$MANIFEST version field invalid: '$MV'"
            exit 1
          fi
          if jq -er '.platforms[] | select(.url | test("\\$|\\{|VERSION|GITHUB_"))' "$MANIFEST" > /dev/null 2>&1; then
            echo "::error::$MANIFEST contains an unexpanded shell variable in a platform URL"
            exit 1
          fi
          # Every supported platform MUST be present. If the Linux
          # AppImage signer fails on one release, Linux clients on the
          # *next* release would otherwise see "no update available"
          # silently because Tauri's plugin returns "no update" when
          # the platform key is missing — they'd be stuck on whichever
          # version they ran when the signer last worked. Failing the
          # release loudly forces the operator to fix the signing
          # secret before any client gets stuck.
          REQUIRED=("darwin-aarch64" "darwin-x86_64" "linux-x86_64" "windows-x86_64")
          MISSING=()
          for p in "${REQUIRED[@]}"; do
            if ! jq -er ".platforms.\"$p\"" "$MANIFEST" > /dev/null 2>&1; then
              MISSING+=("$p")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::$MANIFEST is missing required platforms: ${MISSING[*]}"
            echo "::error::Cause: a build failed to produce a .sig (likely TAURI_SIGNING_PRIVATE_KEY missing on that runner)."
            exit 1
          fi
          PLATFORMS=$(jq -er '.platforms | length' "$MANIFEST")
          echo "OK: $MANIFEST validates with $PLATFORMS platform(s) — all required targets present"

      # Upload the stable manifest to the endpoint the in-app updater
      # reads: `latest.json` goes on the per-tag release. GitHub's
      # `/releases/latest/download/latest.json` URL self-tracks the
      # newest NON-prerelease release, so already-installed stable
      # apps keep updating with no config change. Uploading while the
      # release is still a draft is deliberate — the manifest becomes
      # public atomically when the release publishes below.
      #
      # The beta manifest (`latest-beta.json`) is uploaded AFTER the
      # publish step instead — see "Update beta-channel manifest".
      - name: Upload updater manifest (stable)
        if: steps.channel.outputs.is_beta != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          MANIFEST: ${{ steps.channel.outputs.manifest }}
        run: |
          set -eu
          gh release upload "$TAG" "$MANIFEST" --repo "$GITHUB_REPOSITORY" --clobber
          echo "Uploaded $MANIFEST to release $TAG"

      # Homebrew can't fetch draft release assets (they require auth),
      # so the tap-update workflow needs a published release. Comment
      # the publish + trigger steps out if you want a manual review
      # gate instead.
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"

      # The beta channel reads ONE endpoint: the permanent fixed-tag
      # `updater-manifest` release's `latest-beta.json`. A prerelease
      # has no `/releases/latest/` URL of its own (that URL skips
      # prereleases), so beta needs this stable host. The
      # `updater-manifest` release is created once by hand — see
      # dev-docs/octoally-borrowings.md Item C; CI never creates it.
      #
      # This step runs AFTER "Publish release" on purpose. The
      # manifest's asset URLs point at the per-tag release; while that
      # release is still a draft its assets require auth, so a
      # manifest published earlier would advertise downloads that 404
      # — and if the publish step then failed, the broken state would
      # be durable until manual repair.
      #
      # Two writers keep the endpoint correct:
      #  - a beta tag writes its own manifest;
      #  - a stable tag ALSO writes its manifest there when the stable
      #    version is newer than whatever the endpoint currently
      #    advertises. Per the channel contract (release_channel.rs:
      #    Beta = "stable releases plus prereleases"), a beta user on
      #    0.2.0-beta.2 must be offered the subsequent 0.2.0. The
      #    version guard keeps a stable hotfix (0.1.47) from
      #    regressing a newer beta manifest (0.2.0-beta.1).
      - name: Update beta-channel manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANIFEST: ${{ steps.channel.outputs.manifest }}
          IS_BETA: ${{ steps.channel.outputs.is_beta }}
        run: |
          set -eu
          if [ "$IS_BETA" = "true" ]; then
            if ! gh release view updater-manifest --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
              echo "::error::The 'updater-manifest' host release does not exist."
              echo "::error::Create it once with: gh release create updater-manifest --repo $GITHUB_REPOSITORY --title 'Updater manifests' --notes 'Permanent host for channel manifests (latest-beta.json). Do not delete.' --latest=false"
              exit 1
            fi
            gh release upload updater-manifest "$MANIFEST" --repo "$GITHUB_REPOSITORY" --clobber
            echo "Uploaded $MANIFEST to the updater-manifest host release"
            exit 0
          fi

          # Stable tag: advance the beta endpoint when this stable
          # supersedes it. No host release = beta channel not in use.
          if ! gh release view updater-manifest --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "No 'updater-manifest' host release — beta channel not in use; skipping."
            exit 0
          fi
          CUR=""
          if gh release download updater-manifest --repo "$GITHUB_REPOSITORY" \
               --pattern 'latest-beta.json' --output current-beta.json 2>/dev/null; then
            CUR=$(jq -r '.version // ""' current-beta.json 2>/dev/null || true)
          fi
          NEW=$(jq -r .version "$MANIFEST")
          if [ -n "$CUR" ]; then
            # SemVer comparison: compare numeric cores with sort -V;
            # on an equal core the version WITHOUT a prerelease
            # suffix wins (0.2.0 > 0.2.0-beta.2 — plain `sort -V`
            # gets exactly that case wrong, so the suffix is handled
            # explicitly).
            CUR_CORE="${CUR%%-*}"
            HIGHEST=$(printf '%s\n%s\n' "$CUR_CORE" "$NEW" | sort -V | tail -1)
            if [ "$NEW" != "$HIGHEST" ]; then
              echo "Beta endpoint at $CUR is newer than stable $NEW; leaving it alone."
              exit 0
            fi
            if [ "$NEW" = "$CUR_CORE" ] && [ "$CUR" = "$CUR_CORE" ]; then
              echo "Beta endpoint already at $CUR; nothing to do."
              exit 0
            fi
          fi
          cp "$MANIFEST" latest-beta.json
          gh release upload updater-manifest latest-beta.json --repo "$GITHUB_REPOSITORY" --clobber
          echo "Beta endpoint advanced to stable $NEW (was '${CUR:-none}')"

      # Stable releases only: a `-beta.N` prerelease must never reach
      # the tap — `brew upgrade` would ship it to every stable-channel
      # brew user. update-homebrew.yml rejects prerelease versions as
      # defense in depth.
      - name: Trigger Homebrew tap update
        if: steps.channel.outputs.is_beta != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION_NUM="${TAG#v}"
          gh workflow run update-homebrew.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f version="$VERSION_NUM"
          echo "Triggered Homebrew tap update for $VERSION_NUM"

      # Prune older releases to keep the Releases page tight. Two reasons:
      #   1. Each release ships ~150 MB of signed bundles + sigs across
      #      five platforms; keeping the full back-catalog forever would
      #      bloat the repo's storage usage indefinitely.
      #   2. The in-app updater reads `/releases/latest/download/
      #      latest.json` (stable) and `updater-manifest/latest-beta.json`
      #      (beta), so older releases never serve update traffic — they
      #      are purely historical.
      #
      # Policy (channel-aware): keep the 2 most recent STABLE releases
      # and, SEPARATELY, the 2 most recent BETA (prerelease) releases.
      # Pruning by recency alone would let a burst of betas evict every
      # stable release (or vice-versa), stranding one channel's users
      # on a release whose assets were just deleted. Drafts orphaned by
      # failed runs are pruned too.
      #
      # The permanent `updater-manifest` host release is NEVER deleted —
      # it carries `latest-beta.json` and has no version of its own. It
      # is excluded explicitly below.
      #
      # `continue-on-error: true` because a transient API hiccup here
      # shouldn't fail the release after everything else has succeeded.
      # Worst case: an extra older release lingers until the next
      # release run trims it.
      - name: Prune old releases (keep 2 stable + 2 beta)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          KEEP=2
          # The permanent host release for channel manifests. Never a
          # prune target — it has no version and serves beta traffic.
          MANIFEST_TAG="updater-manifest"

          # Fetch every release with its prerelease flag. `isPrerelease`
          # is the channel signal: betas publish with `prerelease: true`
          # (see the "Create release (draft)" step above).
          RELEASES_JSON=$(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 100 \
            --json tagName,isDraft,isPrerelease,publishedAt)

          # Stable = published, not prerelease, not the manifest host.
          # Beta   = published, prerelease, not the manifest host.
          # Each list is newest-first; keep the head $KEEP, delete the tail.
          STABLE=$(echo "$RELEASES_JSON" | jq -r --arg m "$MANIFEST_TAG" \
            'sort_by(.publishedAt) | reverse | .[]
             | select(.isDraft | not) | select(.isPrerelease | not)
             | select(.tagName != $m) | .tagName')
          BETA=$(echo "$RELEASES_JSON" | jq -r --arg m "$MANIFEST_TAG" \
            'sort_by(.publishedAt) | reverse | .[]
             | select(.isDraft | not) | select(.isPrerelease)
             | select(.tagName != $m) | .tagName')

          STABLE_KEEP=$(echo "$STABLE" | sed -n "1,${KEEP}p")
          STABLE_DELETE=$(echo "$STABLE" | sed -n "$((KEEP+1)),\$p")
          BETA_KEEP=$(echo "$BETA" | sed -n "1,${KEEP}p")
          BETA_DELETE=$(echo "$BETA" | sed -n "$((KEEP+1)),\$p")

          # Orphan drafts — but never the manifest host release.
          DRAFTS=$(echo "$RELEASES_JSON" | jq -r --arg m "$MANIFEST_TAG" \
            '.[] | select(.isDraft) | select(.tagName != $m) | .tagName')

          echo "Keeping stable (most recent $KEEP):"
          echo "$STABLE_KEEP" | sed 's/^/  /'
          echo "Keeping beta (most recent $KEEP):"
          echo "$BETA_KEEP" | sed 's/^/  /'
          echo "Protected (never deleted):"
          echo "  $MANIFEST_TAG"
          echo "Deleting (older stable):"
          echo "$STABLE_DELETE" | sed 's/^/  /'
          echo "Deleting (older beta):"
          echo "$BETA_DELETE" | sed 's/^/  /'
          echo "Deleting (orphan drafts):"
          echo "$DRAFTS" | sed 's/^/  /'

          for tag in $STABLE_DELETE $BETA_DELETE $DRAFTS; do
            [ -z "$tag" ] && continue
            # Defence in depth: never delete the manifest host even if
            # a future query change accidentally lets it through.
            if [ "$tag" = "$MANIFEST_TAG" ]; then
              echo "  skip $tag (protected manifest host)"
              continue
            fi
            echo "  rm $tag"
            gh release delete "$tag" \
              --cleanup-tag \
              --yes \
              --repo "$GITHUB_REPOSITORY" || echo "  (failed; continuing)"
          done
